<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Media Collab - Upload Media</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <nav class="bg-gray-800 text-white p-4">
        <div class="max-w-7xl mx-auto flex justify-between">
            <span class="font-bold text-xl">MediaCollab</span>
            <a href="dashboard.html" class="text-sm underline">Back to Dashboard</a>
        </div>
    </nav>

    <div class="max-w-2xl mx-auto mt-10 bg-white p-8 rounded-xl shadow border">
        <h1 class="text-2xl font-bold mb-6">Upload Media</h1>
        <form id="uploadForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium">Title</label>
                <input type="text" id="title" required class="w-full border p-2 rounded">
            </div>
            <div>
                <label class="block text-sm font-medium">Description</label>
                <textarea id="description" rows="3" class="w-full border p-2 rounded"></textarea>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium">File Path/URL</label>
                    <input type="text" id="file_path" required class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="block text-sm font-medium">File Type</label>
                    <select id="file_type" class="w-full border p-2 rounded bg-white">
                        <option value="image">Image</option>
                        <option value="video">Video</option>
                    </select>
                </div>
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium">Company ID (Target)</label>
                    <input type="number" id="company_id" required class="w-full border p-2 rounded">
                </div>
                <div>
                    <label class="block text-sm font-medium">Deadline (YYYY-MM-DDTHH:MM)</label>
                    <input type="datetime-local" id="end_date" class="w-full border p-2 rounded">
                </div>
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">Upload</button>
        </form>
    </div>

    <div id="toast-container" class="fixed bottom-5 right-5 space-y-2 z-50"></div>
    <script src="app.js"></script>
    <script>
        document.getElementById('uploadForm').addEventListener('submit', handleUpload);
    </script>
</body>
</html>
